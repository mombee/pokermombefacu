<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poker Mombe - Casino Royale</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <!-- Login -->
    <div id="login-screen" class="h-screen flex items-center justify-center bg-zinc-950 p-6 z-[100] relative text-center">
        <div class="bg-zinc-900 p-10 rounded-[40px] border border-amber-500/20 shadow-2xl w-full max-w-md">
            <h1 class="casino-title text-4xl font-bold mb-1 text-amber-500 tracking-widest uppercase">Poker Mombe</h1>
            <p class="text-zinc-500 text-[10px] uppercase tracking-[0.4em] mb-10 font-bold">Casino Royale</p>
            <input type="text" id="username-input" placeholder="TU APODO" maxlength="12" class="w-full bg-black border-2 border-zinc-800 p-5 rounded-2xl mb-4 text-white text-center font-black text-xl focus:border-red-600 outline-none uppercase">
            <button id="join-btn" class="w-full bg-red-700 hover:bg-red-600 border-b-4 border-red-900 py-5 rounded-2xl font-black uppercase text-xl text-white shadow-lg transition-all">SENTARSE EN LA MESA</button>
        </div>
    </div>

    <!-- Recarga -->
    <div id="recharge-modal" class="fixed inset-0 bg-black/90 z-[200] flex items-center justify-center hidden p-6">
        <div class="bg-zinc-900 p-8 rounded-[30px] border-2 border-amber-500 w-full max-w-sm text-center">
            <div class="text-5xl mb-4">💰</div>
            <h2 class="text-2xl font-black uppercase mb-2">Recargar Fichas</h2>
            <input type="range" id="recharge-slider" min="100" max="10000" step="100" value="5000" class="w-full h-4 bg-zinc-800 rounded-lg appearance-none cursor-pointer mb-2">
            <div id="recharge-value" class="text-3xl font-black text-amber-500 mb-8 font-mono">$5,000</div>
            <button id="confirm-recharge-btn" class="w-full bg-green-600 hover:bg-green-500 py-4 rounded-2xl font-black uppercase text-lg shadow-xl">RECARGAR</button>
        </div>
    </div>

    <!-- Juego -->
    <div id="game-screen" class="h-screen flex flex-col bg-black text-white hidden">
        <header class="p-4 bg-zinc-900/50 border-b border-white/5 flex justify-between items-center z-50">
            <div class="flex items-center gap-4">
                <div class="bg-black/80 px-4 py-2 rounded-xl border border-amber-500/10">
                    <div class="text-[9px] text-zinc-500 font-black uppercase tracking-widest">Jugador</div>
                    <div id="display-me-name" class="font-black text-amber-500 text-lg uppercase">---</div>
                </div>
                <div class="hidden md:flex gap-2 bg-black/40 p-2 rounded-xl border border-white/5">
                    <button type="button" onclick="sendEmoji('🍀')" class="hover:scale-125 transition-transform">🍀</button>
                    <button type="button" onclick="sendEmoji('😎')" class="hover:scale-125 transition-transform">😎</button>
                    <button type="button" onclick="sendEmoji('😂')" class="hover:scale-125 transition-transform">😂</button>
                    <button type="button" onclick="sendEmoji('🔥')" class="hover:scale-125 transition-transform">🔥</button>
                    <button type="button" onclick="sendEmoji('💩')" class="hover:scale-125 transition-transform">💩</button>
                    <button type="button" onclick="sendEmoji('💸')" class="hover:scale-125 transition-transform">💸</button>
                </div>
            </div>
            
            <div class="bg-red-950/40 border-2 border-red-600/30 px-10 py-2 rounded-2xl text-center shadow-inner">
                <span class="text-[9px] text-red-400 font-black uppercase tracking-widest">Pozo Total</span>
                <div id="display-pot" class="text-3xl font-black text-amber-500 font-mono leading-none">$0</div>
            </div>

            <div class="flex gap-2">
                <button type="button" id="show-recharge-btn" class="bg-zinc-800 text-amber-500 px-4 py-2 rounded-xl text-xs font-black uppercase border border-amber-500/20">💰 RECARGAR</button>
                <button type="button" id="clear-table-btn" class="text-[10px] text-zinc-600 hover:text-red-500 font-black uppercase">Limpiar Mesa</button>
            </div>
        </header>

        <main class="flex-1 relative flex items-center justify-center p-6 overflow-hidden">
            <div id="table-container" class="w-full max-w-5xl aspect-[21/9] poker-table">
                <div id="players-layer" class="absolute inset-0 pointer-events-none"></div>
                <div class="absolute inset-0 flex flex-col items-center justify-center gap-6 z-10">
                    <div id="community-cards" class="flex gap-3 h-28 items-center justify-center"></div>
                    <div id="action-log" class="bg-black/90 px-8 py-2 rounded-full text-[11px] font-black text-white border border-white/10 uppercase tracking-[0.2em] shadow-xl text-center min-w-[350px]">
                        Esperando jugadores...
                    </div>
                </div>
            </div>
        </main>

        <footer class="p-4 bg-zinc-950 border-t border-white/5 shadow-2xl z-50">
            <div class="max-w-7xl mx-auto flex flex-col lg:flex-row items-center gap-6">
                <div class="flex items-center gap-4 bg-white/5 p-3 rounded-2xl border border-white/10">
                    <div id="my-hand-cards" class="flex gap-2"></div>
                    <div class="pr-2">
                        <div class="text-[9px] text-zinc-500 font-black uppercase mb-1">Mi Mano</div>
                        <div id="my-hand-name" class="text-xl text-white font-black uppercase tracking-tighter truncate w-32">---</div>
                    </div>
                </div>

                <div id="betting-ui" class="hidden flex flex-col items-center gap-2 bg-zinc-900/50 p-4 rounded-2xl border border-white/5 w-full lg:w-96">
                    <div class="flex justify-between w-full px-1">
                        <span class="text-[10px] font-bold text-zinc-400 uppercase tracking-widest">Monto de Apuesta</span>
                        <span id="bet-value-display" class="text-sm font-black text-green-400">$0</span>
                    </div>
                    <input type="range" id="bet-slider" class="w-full h-3 bg-zinc-800 rounded-lg appearance-none cursor-pointer">
                </div>

                <div id="controls-container" class="flex-1 w-full flex gap-3 h-14"></div>
            </div>
        </footer>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="js/app.js" defer></script>
</body>
</html>
